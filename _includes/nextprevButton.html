<section>
    <div class="PageNavigation container-fluid-inner">
        <!-- <button class="btn btn-light bg-image">   -->

            <a class="prev" href="{{page.previous.url}}">&laquo; {{page.previous.title}}</a>
          {% endif %}
        <!-- </button> -->

        <!-- <button class="btn btn-dark bg-image">   -->

            <a class="next" href="{{page.next.url}}">{{page.next.title}} &raquo;</a>
          {% endif %}
        <!-- </button> -->
    </div>
</section>
