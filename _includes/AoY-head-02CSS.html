<link type="text/css" href="style/victor's style.css" rel="stylesheet">
<link type="text/css" href="style/lightcity-02.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link type="text/css" href="../style/style_compareTable.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="//db.onlinewebfonts.com/c/9a95ac248797ec280789f4ece8fe3fd3?family=Sally" rel="stylesheet" type="text/css"/>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&display=swap" rel="stylesheet">

</head>

<body>
    <nav id="homeHeader" class="bg-color bg-image">
        <div class="container">
            <div class="container-fluid-inner cms-clearfix">
                <div class="homeHeaderNav align-items">
                    <div class="churchLOGO">
                        <img class="churchLOGO-img" src="images/LightCityLOGO.jpg" height=" 40" alt="lightcity-LOGO">
                        <!-- <p class="header-links-li">Bible Study Website</p> -->
                    </div>
                    <div class="headerUL">
                        <ul class="header-links">
                        <li class="header-links-li transition">
                            {% for page in site.pages %}{% if page.title contains "Site Home" %}
                            <a class="iconLink transition" href="{% if site.baseurl == "" %}{{page.url}}{% elsif site.baseurl != "" %}/{{site.baseurl}}{{page.url}}{% endif %}">{{page.title}}</a>{% endif %}{% endfor %}
                        </li>
                        
                        <li class="header-links-li transition">
                            {% for page in site.pages %}{% if page.categories contains "HomePage-AoY" %}
                            <a href="{% if site.baseurl == "" %}{{page.url}}{% elsif site.baseurl != "" %}/{{site.baseurl}}{{page.url}}{% endif %}">{{page.title}}</a>{% endif %}{% endfor %}
                        </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
